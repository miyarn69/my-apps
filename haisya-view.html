<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="配車表" />
<link rel="apple-touch-icon" href="haisya-icon.png" />
<link rel="icon" href="haisya-icon.png" />
<meta property="og:title" content="🚌 配車表" />
<meta property="og:description" content="タップして本日の配車を確認してください" />
<meta property="og:type" content="website" />
<title>配車表</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1a237e;
    --blue2: #3949ab;
    --gray: #6b7280;
    --bg: #f0f2f5;
  }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    background: var(--bg);
    color: #1f2937;
    padding-bottom: 40px;
  }
  .header {
    background: linear-gradient(135deg, #1a237e, #283593);
    color: #fff;
    padding: max(18px, env(safe-area-inset-top)) 18px 18px;
    text-align: center;
  }
  .header h1 { font-size: 24px; font-weight: 800; }
  .header .date { font-size: 17px; margin-top: 4px; opacity: .9; font-weight: 700; }
  .header .vsafety { font-size: 12px; margin-top: 5px; opacity: .8; font-weight: 700; }

  .wrap { padding: 16px; max-width: 620px; margin: 0 auto; }

  /* ドライバーカード（老眼配慮で大きめ） */
  .dcard {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
    padding: 18px 18px 16px;
    margin-bottom: 16px;
    border-left: 7px solid var(--blue2);
  }
  .dcard.free { border-left-color: #ef6c00; }

  .dhead {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
    padding-bottom: 12px; margin-bottom: 12px;
    border-bottom: 2px solid #eef2f7;
  }
  .dname { font-size: 28px; font-weight: 900; letter-spacing: 1px; }
  .dcar {
    font-size: 22px; font-weight: 900;
    background: #eef2ff; color: var(--blue2);
    padding: 6px 16px; border-radius: 12px;
  }

  .rline {
    display: flex; align-items: baseline; gap: 10px;
    padding: 10px 0;
    border-bottom: 1px dashed #eef2f7;
  }
  .rline:last-of-type { border-bottom: none; }
  .rnum {
    flex-shrink: 0;
    font-size: 20px; font-weight: 900; color: var(--blue2);
    min-width: 28px;
  }
  .rbody { flex: 1; }
  .rtime { font-size: 20px; font-weight: 800; color: #111; display: block; }
  .rcar {
    font-size: 14px; font-weight: 800;
    background: #eef2ff; color: var(--blue2);
    padding: 2px 10px; border-radius: 8px; margin-left: 10px;
    white-space: nowrap;
  }
  .rname { font-size: 22px; font-weight: 800; color: #1f2937; display: block; margin-top: 2px; }
  .rname .free-mark { font-size: 14px; color: #ef6c00; font-weight: 800; }
  .gate-badge {
    display: inline-block;
    background: #ffd60a; color: #111;
    font-size: 16px; font-weight: 900;
    border-radius: 6px; padding: 1px 10px; margin-left: 8px;
    vertical-align: middle;
  }
  .twoman-badge {
    display: inline-block;
    background: #0ea5e9; color: #fff;
    font-size: 15px; font-weight: 800;
    border-radius: 6px; padding: 1px 10px; margin-left: 8px;
    vertical-align: middle;
  }
  .vbanner {
    font-size: 15px; font-weight: 800; line-height: 1.5;
    border-radius: 10px; padding: 11px 13px; margin: 4px 0 12px;
  }
  .vbanner.red    { background: #fee2e2; color: #b91c1c; }
  .vbanner.yellow { background: #fef3c7; color: #92400e; }
  .rline.red    { background: #fff1f2; border-radius: 8px; }
  .rline.yellow { background: #fffbeb; border-radius: 8px; }
  .dcard.red    { border-left-color: #dc2626; }
  .dcard.yellow { border-left-color: #f59e0b; }

  .dfoot {
    margin-top: 12px; padding-top: 10px;
    border-top: 2px solid #eef2f7;
    text-align: right;
  }
  .runtime { font-size: 18px; font-weight: 800; color: var(--blue2); }

  .empty { text-align: center; color: #9ca3af; font-size: 16px; padding: 50px 16px; }
  .foot-note { text-align: center; font-size: 12px; color: #9ca3af; margin-top: 18px; line-height: 1.7; }
</style>
</head>
<body>

<div class="header">
  <h1>🚌 配車表</h1>
  <div class="date" id="dateLabel">—</div>
  <div class="vsafety" id="vsafety"></div>
</div>

<div class="wrap" id="wrap">
  <div class="empty" id="empty" style="display:none;">📭 表示する配車データがありません。<br>配車担当から送られた最新のリンクを開いてください。</div>
  <div id="list"></div>
  <div class="foot-note">この表は配車担当が作成したものです。<br>変更がある場合は担当者からの連絡を確認してください。</div>
</div>

<script>
  const toMin = t => {
    if (!t) return 9999;
    const [h, m] = String(t).split(':').map(Number);
    return (h || 0) * 60 + (m || 0);
  };
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function decode() {
    try {
      // クエリ（?d=）優先・旧形式の #d= もフォールバックで対応
      let b64 = new URLSearchParams(location.search).get('d');
      if (!b64) b64 = new URLSearchParams(location.hash.slice(1)).get('d');
      if (!b64) return null;
      // base64url を通常の base64 に戻す
      b64 = b64.replace(/-/g,'+').replace(/_/g,'/');
      while (b64.length % 4) b64 += '=';
      const json = decodeURIComponent(escape(atob(b64)));
      return JSON.parse(json);
    } catch { return null; }
  }

  // 規定便カタログ（アプリ側 ROUTE_MASTER と同じ順番）[名前,開始,終了]
  const MASTER = [
    ["筑紫下2補助","4:40","6:05"],["福岡南下補助1","5:10","6:40"],["福岡西下2","5:20","6:30"],
    ["伊田下1","5:30","7:35"],["和白下1補助","5:40","7:15"],["福間下補助","5:45","7:45"],
    ["城南下3上1","6:35","9:30"],["直方補助下1上1","8:40","10:50"],["筑紫下2福南上1","11:30","13:25"],
    ["筑紫下3上2","12:00","14:35"],["博多南下6上3","12:15","13:45"],["行橋下2上1","12:25","16:20"],
    ["博多南下7上4","14:05","15:35"],["筑紫野下補助","14:55","16:45"],["福岡下9上6","15:00","16:45"],
    ["福西補助下上","15:20","17:50"],["前原下6上3","15:25","19:00"],["和白下補助3上補助①","15:30","18:30"],
    ["福岡東下4上1","15:35","17:05"],["宗像下5上4","16:10","19:45"],["福岡南下補助2上補助","16:45","18:10"],
    ["福岡上8","17:20","18:50"],["和白下補助3上補助②","17:25","18:30"],["福岡中央下11上13","18:10","20:10"],
    ["和白下5上4","18:35","19:50"],["博多南下回送上8","18:40","20:20"],["福岡東下補助上2","18:45","19:40"],
    ["飯塚上3","18:45","20:10"],["博多北上9","19:10","20:00"],["福岡上14","19:45","21:15"],
    ["直方下3上2","",""],["フリー便","11:00","21:00"]
  ];
  // ゲート車が必要な便（便名の右に「G」表示）
  const GATE = new Set(['フリー便','城南下3上1','福岡下9上6','福岡上8','伊田下1','福間下補助','福岡中央下11上13']);
  // ツーマン運行（👥2名と表示する便）— トーカイ2のみ
  const TWOMAN = new Set(['トーカイ2','トーカイ２']);
  // 同一車両を複数人で共有する便（重複として警告しない）
  const SHARED = new Set(['トーカイ','トーカイ2','トーカイ２']);
  // 1便分を {name,start,end} に展開（数値=規定便インデックス／配列=臨時便）
  function expandRoute(x) {
    if (Array.isArray(x)) return { name:x[0], start:x[1], end:x[2] };
    const m = MASTER[x] || ["?","",""];
    return { name:m[0], start:m[1], end:m[2] };
  }

  const data = decode();
  if (!data || !data.a) {
    document.getElementById('empty').style.display = 'block';
  } else {
    document.getElementById('dateLabel').textContent = formatDate(data.d);
    if (data.sf) {
      const sd = Math.max(0, Math.floor((Date.now() - new Date(data.sf + 'T00:00:00').getTime()) / 86400000));
      document.getElementById('vsafety').textContent = `🛡️ 無事故継続 ${sd}日`;
    }

    // 便ごとの担当数（ツーマンの主担当決定用）
    const cntByDriver = {};
    data.a.forEach(a => { cntByDriver[a.n] = (cntByDriver[a.n]||0) + a.r.length; });

    // 全便を平坦化（車両付き）
    let flat = [];
    data.a.forEach(a => a.r.forEach(rr => {
      const r = expandRoute(rr);
      flat.push({ n:a.n, car:a.c, name:r.name, start:r.start, end:r.end,
                  s:toMin(r.start), e:toMin(r.end), lv:null, partners:null });
    }));

    // ツーマン（トーカイ2）統合：同じ便・同時刻を主担当1人にまとめ、相方を表示
    const twoG = {};
    flat.forEach(o => { if (TWOMAN.has(o.name)) { const k=o.name+'@'+o.start+'@'+o.end; (twoG[k]=twoG[k]||[]).push(o); } });
    const drop = new Set();
    Object.values(twoG).forEach(g => {
      const drivers = [...new Set(g.map(x=>x.n))];
      if (drivers.length < 2) return;
      drivers.sort((a,b) => (cntByDriver[b]-cntByDriver[a]) || a.localeCompare(b,'ja'));
      const primary = drivers[0], partners = drivers.slice(1);
      g.forEach(o => { if (o.n === primary) o.partners = partners; else drop.add(o); });
    });
    flat = flat.filter(o => !drop.has(o));

    // 重複検出：重なり>15分=赤／重なり〜間隔15分以内=黄（共有便は除外）
    for (let i=0; i<flat.length; i++) {
      for (let j=i+1; j<flat.length; j++) {
        const a=flat[i], b=flat[j];
        if (a.s>=9999||a.e>=9999||b.s>=9999||b.e>=9999) continue;
        if (a.name===b.name && SHARED.has(a.name)) continue;
        const sameDriver = a.n===b.n;
        const sameCar = a.car && a.car===b.car;
        if (!sameDriver && !sameCar) continue;
        const ov = Math.min(a.e,b.e) - Math.max(a.s,b.s);
        const lv = ov>15 ? 'red' : ov>-15 ? 'yellow' : null;
        if (!lv) continue;
        [a,b].forEach(x => { if (lv==='red' || x.lv!=='red') x.lv = lv; });
      }
    }

    // 同名ドライバーをまとめる
    const groups = {};
    flat.forEach(o => { (groups[o.n] = groups[o.n] || []).push(o); });

    const arr = Object.entries(groups).map(([n, routes]) => {
      routes.sort((x,y) => x.s - y.s);
      const cars = [...new Set(routes.map(r => r.car).filter(Boolean))];
      const minS = Math.min(...routes.map(r => r.s));
      const isFree = routes.some(r => r.name.includes('フリー'));
      let worst = null;
      routes.forEach(r => { if (r.lv && (r.lv==='red' || worst!=='red')) worst = r.lv; });
      return { n, cars, routes, minS, isFree, worst };
    });
    arr.sort((a,b) => (a.isFree !== b.isFree) ? (a.isFree ? -1 : 1) : a.minS - b.minS);

    document.getElementById('list').innerHTML = arr.map(it => {
      const multiCar = it.cars.length > 1;
      // やさしめの注意文（成立する運行だが念のため）
      let banner = '';
      if (it.worst === 'red') {
        banner = `<div class="vbanner red">🙏 運行時間が重なっています。慎重に運行し、遅れそうな場合はすぐ輸送へご連絡ください</div>`;
      } else if (it.worst === 'yellow') {
        banner = `<div class="vbanner yellow">🙏 運行の間隔が15分以内に接近しています。お気をつけてお願いします</div>`;
      }
      const lines = it.routes.map((x, i) => {
        const { name, start, end, car, lv, partners } = x;
        const t = start ? `${start} 〜 ${end}` : '時間未定';
        const free = name.includes('フリー') ? '<span class="free-mark">（フリー）</span>' : '';
        const gate = GATE.has(name) ? '<span class="gate-badge">G</span>' : '';
        const two  = partners && partners.length
          ? `<span class="twoman-badge">👥 2名乗務：${esc(partners.join('・'))}</span>`
          : (TWOMAN.has(name) ? '<span class="twoman-badge">👥 2名乗務</span>' : '');
        const carTag = (multiCar && car) ? `<span class="rcar">🚐 ${esc(car)}</span>` : '';
        return `<div class="rline ${lv||''}">
          <span class="rnum">${'①②③④⑤⑥⑦⑧⑨⑩⑪⑫'[i] || '・'}</span>
          <span class="rbody">
            <span class="rtime">${esc(t)}${carTag}${lv?' ⚠️':''}</span>
            <span class="rname">${esc(name)}${free}${gate}${two}</span>
          </span>
        </div>`;
      }).join('');
      const carHtml = it.cars.length
        ? `<span class="dcar">🚐 ${esc(it.cars.join(' / '))}</span>` : '';
      return `<div class="dcard ${it.isFree?'free':''} ${it.worst||''}">
        <div class="dhead">
          <span class="dname">${esc(it.n)}</span>
          ${carHtml}
        </div>
        ${banner}
        ${lines}
      </div>`;
    }).join('');
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const [y, m, d] = iso.split('-').map(Number);
    const w = ['日','月','火','水','木','金','土'][new Date(y, m-1, d).getDay()];
    return `${y}年${m}月${d}日（${w}）`;
  }
</script>
</body>
</html>
