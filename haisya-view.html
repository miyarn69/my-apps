<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="配車表" />
<link rel="apple-touch-icon" href="haisya-icon.png" />
<link rel="icon" href="haisya-icon.png" />
<meta property="og:title" content="🚌 配車表" />
<meta property="og:description" content="タップして本日の配車を確認してください" />
<meta property="og:type" content="website" />
<title>配車表</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1a237e;
    --blue2: #3949ab;
    --gray: #6b7280;
    --bg: #f0f2f5;
  }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    background: var(--bg);
    color: #1f2937;
    padding-bottom: 40px;
  }
  .header {
    background: linear-gradient(135deg, #1a237e, #283593);
    color: #fff;
    padding: max(18px, env(safe-area-inset-top)) 18px 18px;
    text-align: center;
  }
  .header h1 { font-size: 24px; font-weight: 800; }
  .header .date { font-size: 17px; margin-top: 4px; opacity: .9; font-weight: 700; }

  .wrap { padding: 16px; max-width: 620px; margin: 0 auto; }

  /* ドライバーカード（老眼配慮で大きめ） */
  .dcard {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
    padding: 18px 18px 16px;
    margin-bottom: 16px;
    border-left: 7px solid var(--blue2);
  }
  .dcard.free { border-left-color: #ef6c00; }

  .dhead {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
    padding-bottom: 12px; margin-bottom: 12px;
    border-bottom: 2px solid #eef2f7;
  }
  .dname { font-size: 28px; font-weight: 900; letter-spacing: 1px; }
  .dcar {
    font-size: 22px; font-weight: 900;
    background: #eef2ff; color: var(--blue2);
    padding: 6px 16px; border-radius: 12px;
  }

  .rline {
    display: flex; align-items: baseline; gap: 10px;
    padding: 10px 0;
    border-bottom: 1px dashed #eef2f7;
  }
  .rline:last-of-type { border-bottom: none; }
  .rnum {
    flex-shrink: 0;
    font-size: 20px; font-weight: 900; color: var(--blue2);
    min-width: 28px;
  }
  .rbody { flex: 1; }
  .rtime { font-size: 20px; font-weight: 800; color: #111; display: block; }
  .rname { font-size: 22px; font-weight: 800; color: #1f2937; display: block; margin-top: 2px; }
  .rname .free-mark { font-size: 14px; color: #ef6c00; font-weight: 800; }

  .dfoot {
    margin-top: 12px; padding-top: 10px;
    border-top: 2px solid #eef2f7;
    text-align: right;
  }
  .runtime { font-size: 18px; font-weight: 800; color: var(--blue2); }

  .empty { text-align: center; color: #9ca3af; font-size: 16px; padding: 50px 16px; }
  .foot-note { text-align: center; font-size: 12px; color: #9ca3af; margin-top: 18px; line-height: 1.7; }
</style>
</head>
<body>

<div class="header">
  <h1>🚌 配車表</h1>
  <div class="date" id="dateLabel">—</div>
</div>

<div class="wrap" id="wrap">
  <div class="empty" id="empty" style="display:none;">📭 表示する配車データがありません。<br>配車担当から送られた最新のリンクを開いてください。</div>
  <div id="list"></div>
  <div class="foot-note">この表は配車担当が作成したものです。<br>変更がある場合は担当者からの連絡を確認してください。</div>
</div>

<script>
  const toMin = t => {
    if (!t) return 9999;
    const [h, m] = String(t).split(':').map(Number);
    return (h || 0) * 60 + (m || 0);
  };
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function decode() {
    try {
      // クエリ（?d=）優先・旧形式の #d= もフォールバックで対応
      let b64 = new URLSearchParams(location.search).get('d');
      if (!b64) b64 = new URLSearchParams(location.hash.slice(1)).get('d');
      if (!b64) return null;
      // base64url を通常の base64 に戻す
      b64 = b64.replace(/-/g,'+').replace(/_/g,'/');
      while (b64.length % 4) b64 += '=';
      const json = decodeURIComponent(escape(atob(b64)));
      return JSON.parse(json);
    } catch { return null; }
  }

  const data = decode();
  if (!data || !data.a) {
    document.getElementById('empty').style.display = 'block';
  } else {
    document.getElementById('dateLabel').textContent = formatDate(data.d);

    // フリー便を一番上、その後は出発の早い順
    const arr = data.a.map(it => {
      const minS = Math.min(...it.r.map(x => toMin(x[1])));
      const isFree = it.r.some(x => x[0].includes('フリー'));
      const runMin = it.r.reduce((s, x) => {
        const st = toMin(x[1]), en = toMin(x[2]);
        return (st < 9999 && en < 9999 && en > st) ? s + (en - st) : s;
      }, 0);
      return { ...it, minS, isFree, runMin };
    });
    arr.sort((a,b) => (a.isFree !== b.isFree) ? (a.isFree ? -1 : 1) : a.minS - b.minS);

    document.getElementById('list').innerHTML = arr.map(it => {
      const routes = [...it.r].sort((a,b) => toMin(a[1]) - toMin(b[1]));
      const lines = routes.map((x, i) => {
        const [name, start, end] = x;
        const t = start ? `${start} 〜 ${end}` : '時間未定';
        const free = name.includes('フリー') ? '<span class="free-mark">（フリー）</span>' : '';
        return `<div class="rline">
          <span class="rnum">${'①②③④⑤⑥⑦⑧⑨⑩'[i] || '・'}</span>
          <span class="rbody">
            <span class="rtime">${esc(t)}</span>
            <span class="rname">${esc(name)}${free}</span>
          </span>
        </div>`;
      }).join('');
      const tLabel = it.isFree ? '🕐 拘束時間' : '🚌 運行時間';
      const runTxt = it.runMin > 0
        ? `${tLabel} ${Math.floor(it.runMin/60)}時間${String(it.runMin%60).padStart(2,'0')}分` : '';
      const carHtml = it.c ? `<span class="dcar">🚐 ${esc(it.c)}</span>` : '';
      return `<div class="dcard ${it.isFree?'free':''}">
        <div class="dhead">
          <span class="dname">${esc(it.n)}</span>
          ${carHtml}
        </div>
        ${lines}
        <div class="dfoot"><span class="runtime">${runTxt}</span></div>
      </div>`;
    }).join('');
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const [y, m, d] = iso.split('-').map(Number);
    const w = ['日','月','火','水','木','金','土'][new Date(y, m-1, d).getDay()];
    return `${y}年${m}月${d}日（${w}）`;
  }
</script>
</body>
</html>
