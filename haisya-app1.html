<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="配車入力" />
<!-- 更新が反映されやすいようキャッシュ抑制 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<!-- ホーム画面アイコン -->
<link rel="apple-touch-icon" href="haisya-icon.png" />
<link rel="icon" href="haisya-icon.png" />
<title>配車入力（試験版）</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1a237e;
    --blue2: #3949ab;
    --green: #2e7d32;
    --red: #d32f2f;
    --orange: #ef6c00;
    --gray: #6b7280;
    --bg: #f0f2f5;
  }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    background: var(--bg);
    color: #1f2937;
    padding-bottom: 90px;
  }
  .header {
    background: linear-gradient(135deg, #1a237e, #283593);
    color: #fff;
    padding: max(14px, env(safe-area-inset-top)) 16px 14px;
    position: sticky; top: 0; z-index: 50;
  }
  .header h1 { font-size: 17px; font-weight: 800; }
  .header p { font-size: 11px; opacity: .75; margin-top: 2px; }
  .header .ver { position: absolute; top: 10px; right: 14px; font-size: 10px; opacity: .6; }

  .wrap { padding: 14px; max-width: 560px; margin: 0 auto; }

  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 10px rgba(0,0,0,.06);
    padding: 16px;
    margin-bottom: 14px;
  }
  .card h2 { font-size: 15px; font-weight: 800; margin-bottom: 12px; }

  label.lbl { display: block; font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 5px; }
  input, select, textarea {
    width: 100%;
    padding: 12px;
    border: 1.5px solid #e5e7eb;
    border-radius: 12px;
    font: inherit;
    font-size: 16px; /* iPhoneのズーム防止 */
    background: #fafafa;
  }
  input:focus, select:focus { outline: none; border-color: #2563eb; background: #fff; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .full { margin-bottom: 12px; }

  /* ── ドライバー・車両のダイヤル（スクロールホイール） ── */
  .wheel-field {
    position: relative; height: 132px;
    background: #fafafa; border: 1.5px solid #e5e7eb; border-radius: 12px;
    overflow: hidden;
  }
  .wheel {
    height: 100%; overflow-y: scroll;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
    text-align: center; scrollbar-width: none;
  }
  .wheel::-webkit-scrollbar { display: none; }
  .wheel-pad { height: 46px; }
  .wheel-item {
    height: 40px; line-height: 40px;
    scroll-snap-align: center;
    font-size: 17px; font-weight: 700; color: #9ca3af;
  }
  .wheel-item.sel { color: #1f2937; }
  .wheel-center {
    position: absolute; left: 6px; right: 6px; top: 46px; height: 40px;
    pointer-events: none;
    border-top: 1.5px solid #c7d2fe; border-bottom: 1.5px solid #c7d2fe;
    background: rgba(99,102,241,.06); border-radius: 8px;
  }

  /* ── 便選択 ── */
  .group-title {
    font-size: 12px; font-weight: 800; color: #fff;
    padding: 6px 12px; border-radius: 8px;
    margin: 14px 0 8px;
    display: inline-block;
  }
  .g-morning { background: #f59e0b; }
  .g-day     { background: #10b981; }
  .g-evening { background: #6366f1; }

  .route-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 12px;
    margin-bottom: 8px;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    background: #fff;
    font: inherit;
    text-align: left;
    -webkit-tap-highlight-color: transparent;
    transition: all .15s;
  }
  .route-btn .r-name { font-size: 14px; font-weight: 700; }
  .route-btn .r-time { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .route-btn .r-badge {
    font-size: 11px; font-weight: 800;
    padding: 3px 8px; border-radius: 999px;
    background: #f3f4f6; color: #6b7280;
    flex-shrink: 0; margin-left: 8px;
  }
  .route-btn .r-badge.a4000 { background: #fef3c7; color: #92400e; }
  .route-btn .r-badge.a5000 { background: #dcfce7; color: #166534; }
  .route-btn.selected {
    border-color: var(--blue2);
    background: #eef2ff;
  }
  .route-btn.selected .r-name::before { content: "✅ "; }
  .route-btn.used { opacity: .45; }

  /* ── 選択中チップ ── */
  .sel-box {
    background: #eef2ff;
    border-radius: 12px;
    padding: 10px 12px;
    margin-bottom: 12px;
    min-height: 44px;
  }
  .sel-box .empty-note { font-size: 12px; color: #9ca3af; padding-top: 4px; }
  .chip {
    display: inline-flex; align-items: center;
    background: var(--blue2); color: #fff;
    font-size: 12px; font-weight: 700;
    border-radius: 999px;
    padding: 5px 10px;
    margin: 3px 4px 3px 0;
  }
  .chip.rinji { background: var(--orange); }
  .chip .amt {
    background: rgba(255,255,255,.25);
    border-radius: 999px;
    padding: 1px 7px; margin-left: 6px;
    font-size: 11px;
  }
  .chip button {
    background: none; border: none; color: #fff;
    font-size: 14px; margin-left: 6px; padding: 0 2px;
  }

  /* ── ボタン ── */
  .btn {
    display: block; width: 100%;
    padding: 14px;
    border: none; border-radius: 14px;
    font: inherit; font-size: 16px; font-weight: 800;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary { background: var(--blue2); color: #fff; }
  .btn-secondary { background: #e5e7eb; color: #374151; margin-top: 8px; }
  .btn-sm {
    width: auto; display: inline-block;
    padding: 8px 14px; font-size: 13px; border-radius: 10px;
  }
  .btn-danger { background: #fee2e2; color: var(--red); }
  .btn-edit { background: #e0e7ff; color: var(--blue2); margin-right: 6px; }

  /* ── 臨時便 ── */
  .rinji-toggle {
    width: 100%;
    padding: 12px;
    border: 2px dashed #f59e0b;
    border-radius: 12px;
    background: #fffbeb;
    color: #92400e;
    font: inherit; font-size: 14px; font-weight: 700;
    margin: 10px 0;
  }
  .rinji-form { display: none; background: #fffbeb; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
  .rinji-form.open { display: block; }

  /* ── 配車一覧（ドライバー単位） ── */
  .driver-group {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 10px rgba(0,0,0,.06);
    padding: 14px;
    margin-bottom: 12px;
    border-left: 5px solid var(--blue2);
  }
  .driver-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
  .driver-name { font-size: 17px; font-weight: 800; }
  .driver-bind {
    font-size: 12px; font-weight: 700; color: #166534;
    background: #dcfce7; border-radius: 8px;
    padding: 3px 9px; margin-top: 6px; display: inline-block;
  }
  .driver-total { font-size: 13px; font-weight: 800; color: var(--green); }

  .assign-sub { margin-top: 10px; padding-top: 8px; border-top: 1px solid #f3f4f6; }
  .assign-sub:first-of-type { border-top: none; }
  .assign-sub-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .assign-car {
    font-size: 12px; font-weight: 800;
    background: #eef2ff; color: var(--blue2);
    padding: 3px 10px; border-radius: 8px;
  }
  .assign-route-line {
    display: flex; align-items: baseline;
    font-size: 13px;
    padding: 4px 0;
    border-bottom: 1px dashed #f3f4f6;
  }
  .assign-route-line .num { color: var(--blue2); font-weight: 800; margin-right: 6px; flex-shrink: 0; }
  .assign-route-line .t { color: var(--gray); font-size: 12px; margin-right: 8px; flex-shrink: 0; }
  .assign-route-line .rinji-mark { color: var(--orange); font-size: 11px; font-weight: 800; margin-left: 4px; }
  .gate-badge {
    display: inline-block;
    background: #ffd60a; color: #111;
    font-size: 11px; font-weight: 900;
    border-radius: 5px; padding: 1px 6px; margin-left: 6px;
  }
  .twoman-badge {
    display: inline-block;
    background: #0ea5e9; color: #fff;
    font-size: 11px; font-weight: 800;
    border-radius: 5px; padding: 1px 6px; margin-left: 6px;
  }

  /* 無事故継続日数（控えめな帯） */
  .safety-wrap { position: relative; margin-bottom: 12px; }
  .safety {
    text-align: center; font-size: 13px; color: #475569; font-weight: 700;
    background: #fff; border: 1px solid #e2e8f0; border-radius: 999px;
    padding: 8px 14px;
    -webkit-tap-highlight-color: transparent;
  }
  .safety b { color: #0f766e; font-size: 15px; }
  .safety-date { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; border: none; padding: 0; }
  .assign-actions { margin-top: 6px; text-align: right; }

  /* 最下部フッター（運行時間＋手当 横並び） */
  .driver-foot {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 10px; padding-top: 9px;
    border-top: 1.5px solid #eef2f7;
  }
  .run-time { font-size: 13px; font-weight: 700; color: #374151; }
  .run-time b { color: var(--blue2); }

  /* 重複警告（赤＝重大／黄＝要注意15分以内） */
  .driver-group.warn-red    { border-left-color: var(--red); }
  .driver-group.warn-yellow { border-left-color: #f59e0b; }
  .conflict-banner {
    font-size: 12px; font-weight: 800;
    border-radius: 8px; padding: 7px 10px;
    margin: 8px 0 4px;
  }
  .conflict-banner.red    { background: #fee2e2; color: var(--red); }
  .conflict-banner.yellow { background: #fef3c7; color: #92400e; }
  .assign-route-line.red    { background: #fff1f2; }
  .assign-route-line.red .t,
  .assign-route-line.red > span:last-child { color: var(--red); font-weight: 700; }
  .assign-route-line.yellow { background: #fffbeb; }
  .assign-route-line.yellow .t,
  .assign-route-line.yellow > span:last-child { color: #92400e; font-weight: 700; }
  .assign-car.red    { background: #fee2e2; color: var(--red); }
  .assign-car.yellow { background: #fef3c7; color: #92400e; }

  /* ドライバー用ページ作成ボタン */
  .share-btn {
    display: block; width: 100%;
    padding: 14px; margin-bottom: 14px;
    border: none; border-radius: 14px;
    background: #06c755; color: #fff;
    font: inherit; font-size: 15px; font-weight: 800;
    -webkit-tap-highlight-color: transparent;
  }
  .share-btn:disabled { opacity: .6; }

  /* 共有モーダル */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.5);
    display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #fff; border-radius: 18px;
    padding: 22px; width: 100%; max-width: 380px;
  }
  .modal-title { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
  .modal-sub { font-size: 12px; color: var(--gray); margin-bottom: 14px; }
  .modal-url {
    background: #f3f4f6; border-radius: 10px;
    padding: 12px; font-size: 15px; font-weight: 700;
    color: var(--blue2); word-break: break-all;
    text-align: center; margin-bottom: 14px;
  }
  .modal-close {
    width: 100%; padding: 10px; margin-top: 8px;
    background: none; border: none; color: var(--gray);
    font: inherit; font-size: 13px;
  }

  .day-summary {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
    margin-bottom: 14px;
  }
  .stat {
    background: #fff; border-radius: 12px; padding: 10px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
  }
  .stat small { display: block; font-size: 10px; color: var(--gray); font-weight: 700; }
  .stat strong { font-size: 16px; font-weight: 800; }

  .empty { text-align: center; color: #9ca3af; font-size: 13px; padding: 30px 0; }

  /* ── 下部固定バー ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,.95);
    backdrop-filter: blur(10px);
    border-top: 1px solid #e5e7eb;
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    display: flex; gap: 8px;
    z-index: 50;
  }
  .bottom-bar button { flex: 1; padding: 12px; font-size: 14px; }

  /* 追従する保存ボタン（便選択中だけ表示） */
  .floating-save {
    position: fixed;
    left: 50%; transform: translateX(-50%);
    bottom: calc(74px + env(safe-area-inset-bottom));
    width: calc(100% - 28px); max-width: 532px;
    z-index: 60;
    padding: 15px; border: none; border-radius: 14px;
    background: var(--blue2); color: #fff;
    font: inherit; font-size: 16px; font-weight: 800;
    box-shadow: 0 6px 20px rgba(57,73,171,.45);
    display: none;
    -webkit-tap-highlight-color: transparent;
  }
  .floating-save.show { display: block; }

  .toast {
    position: fixed; top: 70px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #1f2937; color: #fff;
    font-size: 13px; font-weight: 700;
    padding: 10px 18px; border-radius: 999px;
    opacity: 0; pointer-events: none;
    transition: all .3s; z-index: 100;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <span class="ver" id="verLabel">v2.4</span>
  <h1>🚚 配車入力（試験版）</h1>
  <p>便をタップして選ぶだけ・データはこの端末に保存</p>
</div>

<div class="wrap">

  <!-- 無事故継続日数（タップでカレンダー設定） -->
  <div class="safety-wrap">
    <div class="safety" id="safety"></div>
    <input type="date" id="safetyDate" class="safety-date" />
  </div>

  <!-- 日付 -->
  <div class="card">
    <label class="lbl">📅 配車日</label>
    <input type="date" id="fDate" />
  </div>

  <!-- 入力フォーム -->
  <div class="card">
    <h2 id="formTitle">➕ 配車を追加</h2>
    <div class="row">
      <div>
        <label class="lbl">👤 ドライバー名</label>
        <div class="wheel-field"><div class="wheel" id="fDriver"></div><div class="wheel-center"></div></div>
        <input type="text" id="fDriverNew" placeholder="新しい名前を入力" autocomplete="off" style="display:none;margin-top:8px;" />
      </div>
      <div>
        <label class="lbl">🚚 車両ナンバー</label>
        <div class="wheel-field"><div class="wheel" id="fCar"></div><div class="wheel-center"></div></div>
        <input type="text" id="fCarNew" placeholder="新しい番号（4桁）" inputmode="numeric" maxlength="4" pattern="\d*" autocomplete="off" style="display:none;margin-top:8px;" />
      </div>
    </div>

    <label class="lbl">✅ 選択中の便（タップ順／⚡臨時は金額タップで修正）</label>
    <div class="sel-box" id="selBox"><div class="empty-note">下のリストから便をタップしてね</div></div>

    <label class="lbl">🚏 便リスト（タップで選択・もう一度タップで解除）</label>
    <div id="routeList"></div>

    <button class="rinji-toggle" id="rinjiToggle">⚡ 臨時便・増便を追加する</button>
    <div class="rinji-form" id="rinjiForm">
      <p id="rinjiTitle" style="font-size:13px;font-weight:800;color:#92400e;margin-bottom:10px;">⚡ 臨時便・増便を登録</p>
      <div class="full">
        <label class="lbl">便名</label>
        <input type="text" id="rName" placeholder="例：福岡臨時下3" />
      </div>
      <div class="row">
        <div>
          <label class="lbl">開始</label>
          <input type="time" id="rStart" />
        </div>
        <div>
          <label class="lbl">終了</label>
          <input type="time" id="rEnd" />
        </div>
      </div>
      <div class="full">
        <label class="lbl">💴 手当金額（円）</label>
        <input type="number" id="rAllow" placeholder="3000" inputmode="numeric" value="3000" />
      </div>
      <p style="font-size:11px;color:#92400e;margin-bottom:8px;">※ 追加した臨時便は下の「⚡臨時・増便」リストに登録され、次回からタップで選べるよ</p>
      <button class="btn btn-primary" id="rinjiAdd" style="padding:10px;font-size:14px;">この臨時便を選択に追加</button>
    </div>

    <button class="btn btn-primary" id="saveBtn">💾 この配車を保存</button>
    <button class="btn btn-secondary" id="clearBtn">入力をクリア</button>
  </div>

  <!-- 一覧 -->
  <div class="day-summary">
    <div class="stat"><small>ドライバー数</small><strong id="sCount">0</strong></div>
    <div class="stat"><small>便数合計</small><strong id="sRoutes">0</strong></div>
    <div class="stat"><small>手当合計</small><strong id="sAllow">¥0</strong></div>
  </div>

  <button class="share-btn" id="shareViewBtn">📲 ドライバー用ページを作成（LINE共有）</button>

  <h2 style="font-size:15px;font-weight:800;margin:4px 0 10px;">📋 この日の配車一覧</h2>
  <div id="list"></div>

</div>

<div class="bottom-bar">
  <button class="btn btn-primary" id="exportBtn">📤 書き出し</button>
  <button class="btn btn-secondary" id="importBtn" style="margin-top:0;">📥 読み込み</button>
  <button class="btn btn-secondary" id="resetDayBtn" style="margin-top:0;">日クリア</button>
</div>
<input type="file" id="importFile" accept=".json,application/json" style="display:none;" />

<button class="floating-save" id="floatingSave">💾 この配車を保存</button>

<div class="modal-overlay" id="shareModal">
  <div class="modal-box">
    <p class="modal-title">📲 ドライバー用リンク</p>
    <p class="modal-sub">このリンクをLINEで全員に送ってね（短縮済み）</p>
    <div class="modal-url" id="modalUrl"></div>
    <button class="btn btn-primary" id="modalShareBtn">📲 LINEで送る</button>
    <button class="btn btn-secondary" id="modalCopyBtn" style="margin-top:8px;">📋 リンクをコピー</button>
    <button class="modal-close" id="modalCloseBtn">閉じる</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const APP_VERSION = '2.5';
  const STORAGE_KEY = 'haisya_trial_v1';
  const CUSTOM_KEY  = 'haisya_custom_routes_v1';

  // ── 便マスター（規定便・手当は固定）──────────────────
  const ROUTE_MASTER = [
    // 早朝
    { name:'筑紫下2補助',        start:'4:40',  end:'6:05',  allowance:4000, group:'morning' },
    { name:'福岡南下補助1',      start:'5:10',  end:'6:40',  allowance:4000, group:'morning' },
    { name:'福岡西下2',          start:'5:20',  end:'6:30',  allowance:4000, group:'morning' },
    { name:'伊田下1',            start:'5:30',  end:'7:35',  allowance:4000, group:'morning' },
    { name:'和白下1補助',        start:'5:40',  end:'7:15',  allowance:4000, group:'morning' },
    { name:'福間下補助',         start:'5:45',  end:'7:45',  allowance:4000, group:'morning' },
    { name:'城南下3上1',         start:'6:35',  end:'9:30',  allowance:4000, group:'morning' },
    { name:'直方補助下1上1',     start:'8:40',  end:'10:50', allowance:3000, group:'morning' },
    // 日中
    { name:'筑紫下2福南上1',     start:'11:30', end:'13:25', allowance:3000, group:'day' },
    { name:'筑紫下3上2',         start:'12:00', end:'14:35', allowance:3000, group:'day' },
    { name:'博多南下6上3',       start:'12:15', end:'13:45', allowance:3000, group:'day' },
    { name:'行橋下2上1',         start:'12:25', end:'16:20', allowance:4000, group:'day' },
    { name:'博多南下7上4',       start:'14:05', end:'15:35', allowance:3000, group:'day' },
    { name:'筑紫野下補助',       start:'14:55', end:'16:45', allowance:3000, group:'day' },
    // 夕方・夜
    { name:'福岡下9上6',         start:'15:00', end:'16:45', allowance:3000, group:'evening' },

  // ── 重複検出（時間・車両）────────────────────────
  // ルール: 重なり>15分=赤(重大)／重なり〜15分 or 間隔<15分=黄(要注意)
  // 戻り値: Map(routeオブジェクト -> {level:'red'|'yellow', types:Set})
  function detectDayConflicts(items) {
    const flat = [];
    items.forEach(it => it.routes.forEach(r => {
      const s = toMin(r.start), e = toMin(r.end);
      if (s < 9999 && e < 9999 && e > s) flat.push({ it, r, s, e });
    }));
    const map = new Map();
    const add = (r, level, type) => {
      if (!map.has(r)) map.set(r, { level, types:new Set() });
      const o = map.get(r);
      o.types.add(type);
      if (level === 'red') o.level = 'red';
    };
    for (let i = 0; i < flat.length; i++) {
      for (let j = i + 1; j < flat.length; j++) {
        const a = flat[i], b = flat[j];
        // ツーマン運行（同じ便を2名）は重複扱いしない
        if (a.r.name === b.r.name && SHARED_RUN.has(a.r.name)) continue;
        const sameDriver = a.it.driver === b.it.driver;
        const sameCar    = a.it.car && a.it.car === b.it.car;
        if (!sameDriver && !sameCar) continue;
        const overlap = Math.min(a.e, b.e) - Math.max(a.s, b.s); // 正=重なり/負=間隔
        let level = null;
        if (overlap > 15) level = 'red';        // 15分超の重なり=重大
        else if (overlap > -15) level = 'yellow'; // 重なり〜15分 or 間隔15分未満=要注意
        if (!level) continue;
        if (sameDriver) { add(a.r, level, 'driver'); add(b.r, level, 'driver'); }
        if (sameCar)    { add(a.r, level, 'car');    add(b.r, level, 'car'); }
      }
    }
    return map;
  }

  // ── 一覧（ドライバー単位でまとめる）────────────────
  function renderList() {
    const items = dayItems();
    if (!items.length) {
      $('list').innerHTML = '<div class="empty">この日の配車はまだないよ</div>';
      return;
    }

    const conflicts = detectDayConflicts(items);

    // ドライバー名でグループ化
    const groups = {};
    items.forEach(it => { (groups[it.driver] = groups[it.driver] || []).push(it); });

    const arr = Object.entries(groups).map(([driver, its]) => {
      const allRoutes = its.flatMap(i => i.routes);
      // 運行時間 = 各便（終了−開始）の合計
      const runMin = allRoutes.reduce((s, r) => {
        const st = toMin(r.start), en = toMin(r.end);
        return (st < 9999 && en < 9999 && en > st) ? s + (en - st) : s;
      }, 0);
      const total = allRoutes.reduce((s, r) => s + (r.allowance||0), 0);
      const minS = Math.min(...allRoutes.map(r => toMin(r.start)));
      const isFree = allRoutes.some(r => r.name.includes('フリー'));
      return { driver, its, runMin, total, minS, isFree };
    });
    // フリー便は必ず一番上、その後は出発が早い順
    arr.sort((a,b) => {
      if (a.isFree !== b.isFree) return a.isFree ? -1 : 1;
      return a.minS - b.minS;
    });

    $('list').innerHTML = arr.map(g => {
      // この人の重複レベル・種別を集計
      const types = new Set();
      let worst = null; // 'red' | 'yellow'
      g.its.forEach(it => it.routes.forEach(r => {
        if (conflicts.has(r)) {
          const c = conflicts.get(r);
          c.types.forEach(t => types.add(t));
          if (c.level === 'red') worst = 'red';
          else if (!worst) worst = 'yellow';
        }
      }));
      let banner = '';
      if (worst) {
        const msgs = [];
        if (types.has('driver')) msgs.push('⏰ 運行時間が接近/重複');
        if (types.has('car'))    msgs.push('🚚 車両が他と接近/重複');
        const head = worst === 'red' ? '⚠️ 重複しています' : '⚠️ 15分以内で接近';
        banner = `<div class="conflict-banner ${worst}">${head}：${msgs.join('　/　')}</div>`;
      }

      // 各配車（車両ごと）— 早い順
      const blocks = [...g.its].sort((a,b) => {
        const am = Math.min(...a.routes.map(r=>toMin(r.start)));
        const bm = Math.min(...b.routes.map(r=>toMin(r.start)));
        return am - bm;
      }).map(it => {
        const routes = [...it.routes].sort((a,b) => toMin(a.start) - toMin(b.start));
        let carLv = null;
        it.routes.forEach(r => {
          if (conflicts.has(r) && conflicts.get(r).types.has('car')) {
            if (conflicts.get(r).level === 'red') carLv = 'red'; else if (!carLv) carLv = 'yellow';
          }
        });
        const lines = routes.map((r,i) => {
          const t = r.start ? `${r.start}〜${r.end}` : '時間未定';
          const lv = conflicts.has(r) ? conflicts.get(r).level : '';
          return `<div class="assign-route-line ${lv}">
            <span class="num">${'①②③④⑤⑥⑦⑧'[i]||'・'}</span>
            <span class="t">${t}</span>
            <span>${esc(r.name)}${GATE_ROUTES.has(r.name)?'<span class="gate-badge">G</span>':''}${TWOMAN_ROUTES.has(r.name)?'<span class="twoman-badge">👥2名</span>':''}${r.rinji?'<span class="rinji-mark">⚡臨時</span>':''}${lv?' ⚠️':''}</span>
          </div>`;
        }).join('');
        const carLabel = it.car ? `🚚 ${esc(it.car)}` : '🚚 車両未設定';
        return `<div class="assign-sub">
          <div class="assign-sub-head">
            <span class="assign-car ${carLv||''}">${carLabel}</span>
            <span style="font-size:11px;color:var(--gray);">${it.routes.length}便</span>
          </div>
          ${lines}
          <div class="assign-actions">
            <button class="btn btn-sm btn-edit" onclick="editItem('${it.id}')">編集</button>
            <button class="btn btn-sm btn-danger" onclick="delItem('${it.id}')">削除</button>
          </div>
        </div>`;
      }).join('');

      const carCount = g.its.length > 1 ? `<span style="font-size:11px;color:var(--orange);font-weight:700;">🔁 ${g.its.length}台乗継</span>` : '';
      // フリー便は「拘束時間」、それ以外は「運行時間」
      const tLabel = g.isFree ? '🕐 拘束時間' : '🚚 運行時間';
      const runLabel = g.runMin > 0
        ? `${tLabel} <b>${Math.floor(g.runMin/60)}時間${String(g.runMin%60).padStart(2,'0')}分</b>`
        : `${tLabel} —`;
      const groupCls = worst === 'red' ? 'warn-red' : worst === 'yellow' ? 'warn-yellow' : '';

      return `<div class="driver-group ${groupCls}">
        <div class="driver-top">
          <span class="driver-name">👤 ${esc(g.driver)} ${carCount}</span>
        </div>
        ${banner}
        ${blocks}
        <div class="driver-foot">
          <span class="run-time">${runLabel}</span>
          <span class="driver-total">手当 ¥${g.total.toLocaleString()}</span>
        </div>
      </div>`;
    }).join('');
  }

  function renderSummary() {
    const items = dayItems();
    const drivers = new Set(items.map(i => i.driver));
    $('sCount').textContent  = drivers.size;
    $('sRoutes').textContent = items.reduce((s,i) => s + i.routes.length, 0);
    const total = items.reduce((s,i) => s + i.routes.reduce((a,r) => a + (r.allowance||0), 0), 0);
    $('sAllow').textContent  = '¥' + total.toLocaleString();
  }

  function renderAll() { renderWheels(); renderRoutes(); renderList(); renderSummary(); }

  window.editItem = function(id) {
    const item = dayItems().find(x => x.id === id);
    if (!item) return;
    editingId = id;
    $('formTitle').textContent = `✏️ 編集：${item.driver}`;
    renderWheels();
    setDriver(item.driver);
    setCar(item.car || '');
    selected = item.routes.map(r => ({...r}));
    renderSelected(); renderRoutes();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.delItem = function(id) {
    if (!confirm('この配車を削除する？')) return;
    const date = $('fDate').value;
    data[date] = (data[date]||[]).filter(x => x.id !== id);
    save(); renderAll();
    toast('🗑 削除したよ');
  };

  $('resetDayBtn').onclick = () => {
    if (!confirm('この日の配車を全部消す？（元に戻せないよ）')) return;
    delete data[$('fDate').value];
    save(); clearForm(); renderAll();
    toast('この日をクリアしたよ');
  };

  // ── JSON書き出し（固定ファイル名で上書き運用）──────
  $('exportBtn').onclick = () => {
    const payload = {
      app: 'haisya-app1', version: 2,
      exported: new Date().toISOString(),
      assignments: data, customRoutes: customRoutes
    };
    const json = JSON.stringify(payload, null, 2);
    if (navigator.share) {
      const file = new File([json], `配車データ_master.json`, { type:'application/json' });
      navigator.share({ files:[file], title:'配車データ' }).catch(() => copyJson(json));
    } else copyJson(json);
  };
  function copyJson(json) {
    navigator.clipboard.writeText(json)
      .then(() => toast('📋 コピーしたよ！クロエに貼り付けてね'))
      .catch(() => alert(json));
  }

  // ── JSON読み込み ──────────────────────────────────
  $('importBtn').onclick = () => $('importFile').click();
  $('importFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(reader.result);
        let importData, importCustom = [];
        if (obj.app === 'haisya-app1' && obj.assignments) {
          importData = obj.assignments;
          importCustom = obj.customRoutes || [];
        } else { importData = obj; }
        const dates = Object.keys(importData);
        if (!confirm(`${dates.length}日分のデータを読み込むよ。\n同じ日付は上書きされる。いい？`)) {
          e.target.value = ''; return;
        }
        Object.assign(data, importData);
        save();
        importCustom.forEach(r => {
          if (!customRoutes.some(c => c.name === r.name) && !MASTER_NAMES.has(r.name)) {
            customRoutes.push(r);
          }
        });
        saveCustom();
        clearForm(); renderAll();
        toast(`📥 ${dates.length}日分を読み込んだよ！`);
      } catch {
        toast('⚠️ ファイルを読み込めなかったよ');
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  });

  // ── ドライバー用ページのURLを生成して共有 ──────────
  // 規定便は番号だけ・臨時便のみ[名前,開始,終了]で送りURLを短く保つ
  function buildViewURL() {
    const items = dayItems();
    const idxOf = {};
    ROUTE_MASTER.forEach((r, i) => { idxOf[r.name] = i; });
    const a = items.map(it => ({
      n: it.driver,
      c: it.car || '',
      r: [...it.routes].sort((x,y)=>toMin(x.start)-toMin(y.start)).map(r => {
        const i = idxOf[r.name];
        return (i !== undefined) ? i : [r.name, r.start, r.end];
      })
    }));
    const compact = { v: 1, d: $('fDate').value, sf: localStorage.getItem('haisya_safety_start') || '', a };
    const json = JSON.stringify(compact);
    const b64 = btoa(unescape(encodeURIComponent(json)))
      .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const base = location.href.replace(/[^/]*(\?.*)?(#.*)?$/, '');
    return base + 'haisya-view.html?d=' + b64;
  }
  // da.gd で短縮（github.io対応・CORS OK）。失敗時は元URL
  async function shortenURL(longUrl) {
    try {
      const res = await fetch('https://da.gd/s?url=' + encodeURIComponent(longUrl));
      const txt = (await res.text()).trim();
      return /^https?:\/\//.test(txt) ? txt : longUrl;
    } catch { return longUrl; }
  }

  let currentShareUrl = '';
  $('shareViewBtn').onclick = async () => {
    if (!dayItems().length) { toast('この日の配車がまだないよ'); return; }
    const btn = $('shareViewBtn');
    btn.disabled = true; btn.textContent = '🔗 リンク作成中…';
    currentShareUrl = await shortenURL(buildViewURL());
    btn.disabled = false; btn.textContent = '📲 ドライバー用ページを作成（LINE共有）';
    $('modalUrl').textContent = currentShareUrl;
    $('shareModal').classList.add('open');
  };
  // モーダル内のボタンは「新しいタップ」なのでiOSでも共有が動く
  $('modalShareBtn').onclick = () => {
    const text = `🚚 ${$('fDate').value} の配車表`;
    if (navigator.share) {
      navigator.share({ title:'配車表', text, url: currentShareUrl }).catch(() => {});
    } else copyShare();
  };
  $('modalCopyBtn').onclick = copyShare;
  $('modalCloseBtn').onclick = () => $('shareModal').classList.remove('open');
  function copyShare() {
    // 方法1: Clipboard API（モダンブラウザ）
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(currentShareUrl)
        .then(() => toast('📋 コピーしたよ！LINEに貼って送ってね'))
        .catch(() => fallbackCopy());
    } else {
      fallbackCopy();
    }
  }
  function fallbackCopy() {
    // 方法2: テキストエリアを使ったコピー（Windows Edge等でも確実に動く）
    const ta = document.createElement('textarea');
    ta.value = currentShareUrl;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
      document.execCommand('copy');
      toast('📋 コピーしたよ！LINEに貼って送ってね');
    } catch {
      // 方法3: 手動コピー用ダイアログ
      prompt('このリンクを選択してコピーしてLINEに貼ってね', currentShareUrl);
    }
    document.body.removeChild(ta);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function toast(msg) {
    const t = $('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── 無事故継続日数 ───────────────────────────────
  const SAFE_KEY = 'haisya_safety_start';
  function renderSafety() {
    let s = localStorage.getItem(SAFE_KEY);
    if (!s) { s = todayISO(); localStorage.setItem(SAFE_KEY, s); }
    const days = Math.max(0, Math.floor((Date.now() - new Date(s + 'T00:00:00').getTime()) / 86400000));
    $('safety').innerHTML = `🛡️ 無事故継続 <b>${days}</b> 日（${s}〜・タップで設定）`;
    $('safetyDate').value = s;
  }
  // カレンダーで開始日を選択（事故があった日に設定すればリセット）
  $('safetyDate').addEventListener('change', () => {
    if (!$('safetyDate').value) return;
    localStorage.setItem(SAFE_KEY, $('safetyDate').value);
    renderSafety();
    toast('🛡️ 無事故記録を更新したよ');
  });

  // ── 起動 ─────────────────────────────────────────
  $('verLabel').textContent = 'v' + APP_VERSION;
  renderSafety();
  $('fDate').value = todayISO();
  $('fDate').addEventListener('change', () => { clearForm(); renderAll(); });
  renderAll();
</script>
</body>
</html>
