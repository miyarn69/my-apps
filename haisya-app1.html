<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="配車入力" />
<!-- 更新が反映されやすいようキャッシュ抑制 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<!-- ホーム画面アイコン -->
<link rel="apple-touch-icon" href="haisya-icon.png" />
<link rel="icon" href="haisya-icon.png" />
<title>配車入力（試験版）</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1a237e;
    --blue2: #3949ab;
    --green: #2e7d32;
    --red: #d32f2f;
    --orange: #ef6c00;
    --gray: #6b7280;
    --bg: #f0f2f5;
  }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    background: var(--bg);
    color: #1f2937;
    padding-bottom: 90px;
  }
  .header {
    background: linear-gradient(135deg, #1a237e, #283593);
    color: #fff;
    padding: max(14px, env(safe-area-inset-top)) 16px 14px;
    position: sticky; top: 0; z-index: 50;
  }
  .header h1 { font-size: 17px; font-weight: 800; }
  .header p { font-size: 11px; opacity: .75; margin-top: 2px; }
  .header .ver { position: absolute; top: 10px; right: 14px; font-size: 10px; opacity: .6; }

  .wrap { padding: 14px; max-width: 560px; margin: 0 auto; }

  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 10px rgba(0,0,0,.06);
    padding: 16px;
    margin-bottom: 14px;
  }
  .card h2 { font-size: 15px; font-weight: 800; margin-bottom: 12px; }

  label.lbl { display: block; font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 5px; }
  input, select, textarea {
    width: 100%;
    padding: 12px;
    border: 1.5px solid #e5e7eb;
    border-radius: 12px;
    font: inherit;
    font-size: 16px; /* iPhoneのズーム防止 */
    background: #fafafa;
  }
  input:focus, select:focus { outline: none; border-color: #2563eb; background: #fff; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .full { margin-bottom: 12px; }

  /* ── ドライバー・車両のタップ選択 ── */
  .pick-wrap { margin-bottom: 12px; }
  .pick-label { font-size: 11px; font-weight: 700; color: var(--gray); margin-bottom: 6px; }
  .pick-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    max-height: 140px; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .pick-chip {
    padding: 9px 13px;
    border: 1.5px solid #e5e7eb; border-radius: 999px;
    background: #fff; font: inherit; font-size: 14px; font-weight: 700;
    color: #374151;
    -webkit-tap-highlight-color: transparent;
  }
  .pick-chip.active { background: var(--blue2); color: #fff; border-color: var(--blue2); }

  /* ── 便選択 ── */
  .group-title {
    font-size: 12px; font-weight: 800; color: #fff;
    padding: 6px 12px; border-radius: 8px;
    margin: 14px 0 8px;
    display: inline-block;
  }
  .g-morning { background: #f59e0b; }
  .g-day     { background: #10b981; }
  .g-evening { background: #6366f1; }

  .route-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 12px;
    margin-bottom: 8px;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    background: #fff;
    font: inherit;
    text-align: left;
    -webkit-tap-highlight-color: transparent;
    transition: all .15s;
  }
  .route-btn .r-name { font-size: 14px; font-weight: 700; }
  .route-btn .r-time { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .route-btn .r-badge {
    font-size: 11px; font-weight: 800;
    padding: 3px 8px; border-radius: 999px;
    background: #f3f4f6; color: #6b7280;
    flex-shrink: 0; margin-left: 8px;
  }
  .route-btn .r-badge.a4000 { background: #fef3c7; color: #92400e; }
  .route-btn .r-badge.a5000 { background: #dcfce7; color: #166534; }
  .route-btn.selected {
    border-color: var(--blue2);
    background: #eef2ff;
  }
  .route-btn.selected .r-name::before { content: "✅ "; }
  .route-btn.used { opacity: .45; }

  /* ── 選択中チップ ── */
  .sel-box {
    background: #eef2ff;
    border-radius: 12px;
    padding: 10px 12px;
    margin-bottom: 12px;
    min-height: 44px;
  }
  .sel-box .empty-note { font-size: 12px; color: #9ca3af; padding-top: 4px; }
  .chip {
    display: inline-flex; align-items: center;
    background: var(--blue2); color: #fff;
    font-size: 12px; font-weight: 700;
    border-radius: 999px;
    padding: 5px 10px;
    margin: 3px 4px 3px 0;
  }
  .chip.rinji { background: var(--orange); }
  .chip .amt {
    background: rgba(255,255,255,.25);
    border-radius: 999px;
    padding: 1px 7px; margin-left: 6px;
    font-size: 11px;
  }
  .chip button {
    background: none; border: none; color: #fff;
    font-size: 14px; margin-left: 6px; padding: 0 2px;
  }

  /* ── ボタン ── */
  .btn {
    display: block; width: 100%;
    padding: 14px;
    border: none; border-radius: 14px;
    font: inherit; font-size: 16px; font-weight: 800;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary { background: var(--blue2); color: #fff; }
  .btn-secondary { background: #e5e7eb; color: #374151; margin-top: 8px; }
  .btn-sm {
    width: auto; display: inline-block;
    padding: 8px 14px; font-size: 13px; border-radius: 10px;
  }
  .btn-danger { background: #fee2e2; color: var(--red); }
  .btn-edit { background: #e0e7ff; color: var(--blue2); margin-right: 6px; }

  /* ── 臨時便 ── */
  .rinji-toggle {
    width: 100%;
    padding: 12px;
    border: 2px dashed #f59e0b;
    border-radius: 12px;
    background: #fffbeb;
    color: #92400e;
    font: inherit; font-size: 14px; font-weight: 700;
    margin: 10px 0;
  }
  .rinji-form { display: none; background: #fffbeb; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
  .rinji-form.open { display: block; }

  /* ── 配車一覧（ドライバー単位） ── */
  .driver-group {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 10px rgba(0,0,0,.06);
    padding: 14px;
    margin-bottom: 12px;
    border-left: 5px solid var(--blue2);
  }
  .driver-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
  .driver-name { font-size: 17px; font-weight: 800; }
  .driver-bind {
    font-size: 12px; font-weight: 700; color: #166534;
    background: #dcfce7; border-radius: 8px;
    padding: 3px 9px; margin-top: 6px; display: inline-block;
  }
  .driver-total { font-size: 13px; font-weight: 800; color: var(--green); }

  .assign-sub { margin-top: 10px; padding-top: 8px; border-top: 1px solid #f3f4f6; }
  .assign-sub:first-of-type { border-top: none; }
  .assign-sub-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .assign-car {
    font-size: 12px; font-weight: 800;
    background: #eef2ff; color: var(--blue2);
    padding: 3px 10px; border-radius: 8px;
  }
  .assign-route-line {
    display: flex; align-items: baseline;
    font-size: 13px;
    padding: 4px 0;
    border-bottom: 1px dashed #f3f4f6;
  }
  .assign-route-line .num { color: var(--blue2); font-weight: 800; margin-right: 6px; flex-shrink: 0; }
  .assign-route-line .t { color: var(--gray); font-size: 12px; margin-right: 8px; flex-shrink: 0; }
  .assign-route-line .rinji-mark { color: var(--orange); font-size: 11px; font-weight: 800; margin-left: 4px; }
  .assign-actions { margin-top: 6px; text-align: right; }

  /* 最下部フッター（運行時間＋手当 横並び） */
  .driver-foot {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 10px; padding-top: 9px;
    border-top: 1.5px solid #eef2f7;
  }
  .run-time { font-size: 13px; font-weight: 700; color: #374151; }
  .run-time b { color: var(--blue2); }

  /* 重複警告 */
  .driver-group.conflict { border-left-color: var(--red); }
  .conflict-banner {
    background: #fee2e2; color: var(--red);
    font-size: 12px; font-weight: 800;
    border-radius: 8px; padding: 7px 10px;
    margin: 8px 0 4px;
  }
  .assign-route-line.conflict { background: #fff1f2; }
  .assign-route-line.conflict .t,
  .assign-route-line.conflict > span:last-child { color: var(--red); font-weight: 700; }
  .assign-car.conflict { background: #fee2e2; color: var(--red); }

  .day-summary {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
    margin-bottom: 14px;
  }
  .stat {
    background: #fff; border-radius: 12px; padding: 10px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
  }
  .stat small { display: block; font-size: 10px; color: var(--gray); font-weight: 700; }
  .stat strong { font-size: 16px; font-weight: 800; }

  .empty { text-align: center; color: #9ca3af; font-size: 13px; padding: 30px 0; }

  /* ── 下部固定バー ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,.95);
    backdrop-filter: blur(10px);
    border-top: 1px solid #e5e7eb;
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    display: flex; gap: 8px;
    z-index: 50;
  }
  .bottom-bar button { flex: 1; padding: 12px; font-size: 14px; }

  .toast {
    position: fixed; top: 70px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #1f2937; color: #fff;
    font-size: 13px; font-weight: 700;
    padding: 10px 18px; border-radius: 999px;
    opacity: 0; pointer-events: none;
    transition: all .3s; z-index: 100;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <span class="ver" id="verLabel">v1.3</span>
  <h1>🚌 配車入力（試験版）</h1>
  <p>便をタップして選ぶだけ・データはこの端末に保存</p>
</div>

<div class="wrap">

  <!-- 日付 -->
  <div class="card">
    <label class="lbl">📅 配車日</label>
    <input type="date" id="fDate" />
  </div>

  <!-- 入力フォーム -->
  <div class="card">
    <h2 id="formTitle">➕ 配車を追加</h2>
    <div class="row">
      <div>
        <label class="lbl">👤 ドライバー名</label>
        <input type="text" id="fDriver" placeholder="例：山田" autocomplete="off" />
      </div>
      <div>
        <label class="lbl">🚐 車両ナンバー</label>
        <input type="text" id="fCar" placeholder="例：1234" inputmode="numeric" maxlength="4" pattern="\d*" autocomplete="off" />
      </div>
    </div>
    <div class="pick-wrap">
      <div class="pick-label">👤 ドライバーを選ぶ（タップ）</div>
      <div class="pick-row" id="driverPick"></div>
    </div>
    <div class="pick-wrap">
      <div class="pick-label">🚐 車両を選ぶ（タップ）</div>
      <div class="pick-row" id="carPick"></div>
    </div>

    <label class="lbl">✅ 選択中の便（タップ順／⚡臨時は金額タップで修正）</label>
    <div class="sel-box" id="selBox"><div class="empty-note">下のリストから便をタップしてね</div></div>

    <label class="lbl">🚏 便リスト（タップで選択・もう一度タップで解除）</label>
    <div id="routeList"></div>

    <button class="rinji-toggle" id="rinjiToggle">⚡ 臨時便・増便を追加する</button>
    <div class="rinji-form" id="rinjiForm">
      <div class="full">
        <label class="lbl">便名</label>
        <input type="text" id="rName" placeholder="例：福岡臨時下3" />
      </div>
      <div class="row">
        <div>
          <label class="lbl">開始</label>
          <input type="time" id="rStart" />
        </div>
        <div>
          <label class="lbl">終了</label>
          <input type="time" id="rEnd" />
        </div>
      </div>
      <div class="full">
        <label class="lbl">💴 手当金額（円）</label>
        <input type="number" id="rAllow" placeholder="3000" inputmode="numeric" value="3000" />
      </div>
      <p style="font-size:11px;color:#92400e;margin-bottom:8px;">※ 追加した臨時便は下の「⚡臨時・増便」リストに登録され、次回からタップで選べるよ</p>
      <button class="btn btn-primary" id="rinjiAdd" style="padding:10px;font-size:14px;">この臨時便を選択に追加</button>
    </div>

    <button class="btn btn-primary" id="saveBtn">💾 この配車を保存</button>
    <button class="btn btn-secondary" id="clearBtn">入力をクリア</button>
  </div>

  <!-- 一覧 -->
  <div class="day-summary">
    <div class="stat"><small>ドライバー数</small><strong id="sCount">0</strong></div>
    <div class="stat"><small>便数合計</small><strong id="sRoutes">0</strong></div>
    <div class="stat"><small>手当合計</small><strong id="sAllow">¥0</strong></div>
  </div>

  <h2 style="font-size:15px;font-weight:800;margin:4px 0 10px;">📋 この日の配車一覧</h2>
  <div id="list"></div>

</div>

<div class="bottom-bar">
  <button class="btn btn-primary" id="exportBtn">📤 書き出し</button>
  <button class="btn btn-secondary" id="importBtn" style="margin-top:0;">📥 読み込み</button>
  <button class="btn btn-secondary" id="resetDayBtn" style="margin-top:0;">日クリア</button>
</div>
<input type="file" id="importFile" accept=".json,application/json" style="display:none;" />

<div class="toast" id="toast"></div>

<script>
  const APP_VERSION = '1.3';
  const STORAGE_KEY = 'haisya_trial_v1';
  const CUSTOM_KEY  = 'haisya_custom_routes_v1';

  // ── 便マスター（規定便・手当は固定）──────────────────
  const ROUTE_MASTER = [
    // 早朝
    { name:'筑紫下2補助',        start:'4:40',  end:'6:05',  allowance:4000, group:'morning' },
    { name:'福岡南下補助1',      start:'5:10',  end:'6:40',  allowance:4000, group:'morning' },
    { name:'福岡西下2',          start:'5:20',  end:'6:30',  allowance:4000, group:'morning' },
    { name:'伊田下1',            start:'5:30',  end:'7:35',  allowance:4000, group:'morning' },
    { name:'和白下1補助',        start:'5:40',  end:'7:15',  allowance:4000, group:'morning' },
    { name:'福間下補助',         start:'5:45',  end:'7:45',  allowance:4000, group:'morning' },
    { name:'城南下3上1',         start:'6:35',  end:'9:30',  allowance:4000, group:'morning' },
    { name:'直方補助下1上1',     start:'8:40',  end:'10:50', allowance:3000, group:'morning' },
    // 日中
    { name:'筑紫下2福南上1',     start:'11:30', end:'13:25', allowance:3000, group:'day' },
    { name:'筑紫下3上2',         start:'12:00', end:'14:35', allowance:3000, group:'day' },
    { name:'博多南下6上3',       start:'12:15', end:'13:45', allowance:3000, group:'day' },
    { name:'行橋下2上1',         start:'12:25', end:'16:20', allowance:4000, group:'day' },
    { name:'博多南下7上4',       start:'14:05', end:'15:35', allowance:3000, group:'day' },
    { name:'筑紫野下補助',       start:'14:55', end:'16:45', allowance:3000, group:'day' },
    // 夕方・夜
    { name:'福岡下9上6',         start:'15:00', end:'16:45', allowance:3000, group:'evening' },
    { name:'福西補助下上',       start:'15:20', end:'17:50', allowance:4000, group:'evening' },
    { name:'前原下6上3',         start:'15:25', end:'19:00', allowance:3000, group:'evening' },
    { name:'和白下補助3上補助①', start:'15:30', end:'18:30', allowance:3000, group:'evening' },
    { name:'福岡東下4上1',       start:'15:35', end:'17:05', allowance:3000, group:'evening' },
    { name:'宗像下5上4',         start:'16:10', end:'19:45', allowance:4000, group:'evening' },
    { name:'福岡南下補助2上補助', start:'16:45', end:'18:10', allowance:3000, group:'evening' },
    { name:'福岡上8',            start:'17:20', end:'18:50', allowance:3000, group:'evening' },
    { name:'和白下補助3上補助②', start:'17:25', end:'18:30', allowance:3000, group:'evening' },
    { name:'福岡中央下11上13',   start:'18:10', end:'20:10', allowance:3000, group:'evening' },
    { name:'和白下5上4',         start:'18:35', end:'19:50', allowance:4000, group:'evening' },
    { name:'博多南下回送上8',    start:'18:40', end:'20:20', allowance:3000, group:'evening' },
    { name:'福岡東下補助上2',    start:'18:45', end:'19:40', allowance:3000, group:'evening' },
    { name:'飯塚上3',            start:'18:45', end:'20:10', allowance:3000, group:'evening' },
    { name:'博多北上9',          start:'19:10', end:'20:00', allowance:3000, group:'evening' },
    { name:'福岡上14',           start:'19:45', end:'21:15', allowance:4000, group:'evening' },
    { name:'直方下3上2',         start:'',      end:'',      allowance:5000, group:'evening' },
  ];
  const MASTER_NAMES = new Set(ROUTE_MASTER.map(r => r.name));

  // ── ドライバー・車両DB（実績データから学習）──────────
  const DRIVER_SEED = ['本村','坂田','川原','後藤','辻','中村','藤','安河内','高瀬','清原','尾畑','取渕','久野','池田奥','日高','大石','酒井','古賀','新川','佐伯','宮本','百田'];
  const CAR_SEED = ['79','1143','2502','2793','3409','3433','4625','4786','5025','7688','8288','9094','9660'];

  const $ = id => document.getElementById(id);
  const uid = () => Math.random().toString(36).slice(2, 10);
  const toMin = t => {
    if (!t) return 9999;
    const [h, m] = String(t).split(':').map(Number);
    return (h || 0) * 60 + (m || 0);
  };
  const fmtMin = m => `${Math.floor(m/60)}:${String(m%60).padStart(2,'0')}`;
  const todayISO = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };

  // ── 状態 ─────────────────────────────────────────
  let data = load();
  let customRoutes = loadCustom();
  let selected = [];
  let editingId = null;

  function loadCustom() {
    try { return JSON.parse(localStorage.getItem(CUSTOM_KEY)) || []; }
    catch { return []; }
  }
  function saveCustom() { localStorage.setItem(CUSTOM_KEY, JSON.stringify(customRoutes)); }

  function load() {
    try {
      const d = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      Object.values(d).forEach(items => items.forEach(item =>
        item.routes.forEach(r => { if (r.name === '前原下4上3') r.name = '前原下6上3'; })
      ));
      return d;
    }
    catch { return {}; }
  }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  function dayItems() { return data[$('fDate').value] || []; }

  // ── ドライバー・車両のタップ選択チップ ──────────────
  function renderPickers() {
    const drivers = new Set(DRIVER_SEED);
    const cars = new Set(CAR_SEED);
    Object.values(data).forEach(items => items.forEach(it => {
      if (it.driver) drivers.add(it.driver);
      if (it.car) cars.add(it.car);
    }));
    const curD = $('fDriver').value.trim();
    const curC = $('fCar').value.trim();
    $('driverPick').innerHTML = [...drivers].sort((a,b)=>a.localeCompare(b,'ja'))
      .map(d => `<button type="button" class="pick-chip ${d===curD?'active':''}" onclick="pickDriver('${esc(d)}')">${esc(d)}</button>`).join('');
    $('carPick').innerHTML = [...cars].sort((a,b)=>Number(a)-Number(b))
      .map(c => `<button type="button" class="pick-chip ${c===curC?'active':''}" onclick="pickCar('${esc(c)}')">${esc(c)}</button>`).join('');
  }
  window.pickDriver = function(d) {
    $('fDriver').value = ($('fDriver').value.trim() === d) ? '' : d;
    renderPickers();
  };
  window.pickCar = function(c) {
    $('fCar').value = ($('fCar').value.trim() === c) ? '' : c;
    renderPickers();
  };

  // ── 便リスト描画 ──────────────────────────────────
  function renderRoutes() {
    const usedNames = new Set();
    dayItems().forEach(item => {
      if (item.id !== editingId) item.routes.forEach(r => usedNames.add(r.name));
    });
    const selNames = new Set(selected.map(r => r.name));

    const groups = [
      { key:'morning', label:'🌅 早朝便', cls:'g-morning' },
      { key:'day',     label:'☀️ 日中便', cls:'g-day' },
      { key:'evening', label:'🌆 夕方・夜便', cls:'g-evening' },
    ];

    const btnHtml = (r, isCustom) => {
      const sel  = selNames.has(r.name);
      const used = usedNames.has(r.name);
      const aCls = r.allowance >= 5000 ? 'a5000' : r.allowance >= 4000 ? 'a4000' : '';
      const time = r.start ? `${r.start}〜${r.end}` : '時間自由';
      const del  = isCustom ? `<span onclick="event.stopPropagation();delCustom('${esc(r.name)}')" style="font-size:12px;color:#9ca3af;padding:4px 6px;">✕削除</span>` : '';
      return `<div class="route-btn ${sel?'selected':''} ${used&&!sel?'used':''}" onclick="toggleRoute('${esc(r.name)}')">
        <span>
          <span class="r-name">${esc(r.name)}</span><br>
          <span class="r-time">${time}${used&&!sel?'　※配車済':''}</span>
        </span>
        <span style="display:flex;align-items:center;">${del}<span class="r-badge ${aCls}">¥${r.allowance.toLocaleString()}</span></span>
      </div>`;
    };

    let html = groups.map(g => {
      const btns = ROUTE_MASTER.filter(r => r.group === g.key).map(r => btnHtml(r, false)).join('');
      return `<div class="group-title ${g.cls}">${g.label}</div>${btns}`;
    }).join('');

    if (customRoutes.length) {
      html += `<div class="group-title" style="background:#f97316;">⚡ 臨時・増便（登録済み）</div>` +
        customRoutes.map(r => btnHtml(r, true)).join('');
    }
    $('routeList').innerHTML = html;
  }

  window.toggleRoute = function(name) {
    const i = selected.findIndex(r => r.name === name);
    if (i >= 0) selected.splice(i, 1);
    else {
      const m = ROUTE_MASTER.find(r => r.name === name) || customRoutes.find(r => r.name === name);
      if (!m) return;
      const rinji = !MASTER_NAMES.has(name);
      selected.push({ name:m.name, start:m.start, end:m.end, allowance:m.allowance, rinji });
    }
    renderSelected(); renderRoutes();
  };

  window.delCustom = function(name) {
    if (!confirm(`臨時便「${name}」をリストから削除する？\n（保存済みの配車データには影響しないよ）`)) return;
    customRoutes = customRoutes.filter(r => r.name !== name);
    saveCustom(); renderRoutes();
    toast('臨時便を削除したよ');
  };

  window.removeSel = function(i) {
    selected.splice(i, 1);
    renderSelected(); renderRoutes();
  };

  // 臨時便のみ金額修正（規定便は不可）
  window.editSelAllow = function(i) {
    const r = selected[i];
    if (!r.rinji) { toast('規定便の金額は固定だよ'); return; }
    const cur = r.allowance;
    const v = prompt(`「${r.name}」の手当金額（円）`, cur);
    if (v === null) return;
    const n = Number(v);
    if (!Number.isFinite(n) || n < 0) { toast('数字で入れてね'); return; }
    r.allowance = n;
    // 臨時便マスターの金額も更新
    const cm = customRoutes.find(c => c.name === r.name);
    if (cm) { cm.allowance = n; saveCustom(); }
    renderSelected(); renderRoutes();
    toast('💴 金額を修正したよ');
  };

  function renderSelected() {
    if (!selected.length) {
      $('selBox').innerHTML = '<div class="empty-note">下のリストから便をタップしてね</div>';
      return;
    }
    $('selBox').innerHTML = selected.map((r,i) => {
      const amt = r.rinji
        ? `<span class="amt" onclick="event.stopPropagation();editSelAllow(${i})">¥${r.allowance.toLocaleString()} ✏️</span>`
        : '';
      return `<span class="chip ${r.rinji?'rinji':''}">${r.rinji?'⚡':''}${esc(r.name)}${amt}<button onclick="removeSel(${i})">✕</button></span>`;
    }).join('');
  }

  // ── 臨時便フォーム ─────────────────────────────────
  $('rinjiToggle').onclick = () => $('rinjiForm').classList.toggle('open');
  $('rinjiAdd').onclick = () => {
    const name = $('rName').value.trim();
    if (!name) { toast('臨時便の便名を入れてね'); return; }
    if (MASTER_NAMES.has(name) || customRoutes.some(r => r.name === name)) {
      toast('同じ便名がもうあるよ。リストから選んでね'); return;
    }
    const route = {
      name, start: $('rStart').value, end: $('rEnd').value,
      allowance: Number($('rAllow').value) || 3000
    };
    customRoutes.push(route);
    saveCustom();
    selected.push({ ...route, rinji: true });
    $('rName').value = ''; $('rStart').value = ''; $('rEnd').value = ''; $('rAllow').value = '3000';
    $('rinjiForm').classList.remove('open');
    renderSelected(); renderRoutes();
    toast('⚡ 臨時便を登録＆選択したよ');
  };

  // ── 保存 ─────────────────────────────────────────
  $('saveBtn').onclick = () => {
    const driver = $('fDriver').value.trim();
    const car    = $('fCar').value.trim();
    if (!driver)          { toast('ドライバー名を入れてね'); return; }
    if (!selected.length) { toast('便を1つ以上選んでね');   return; }
    if (car && !/^\d{1,4}$/.test(car)) { toast('車両ナンバーは数字4桁までだよ'); return; }

    const date = $('fDate').value;
    if (!data[date]) data[date] = [];

    const sorted = [...selected].sort((a,b) => toMin(a.start) - toMin(b.start));

    let savedId;
    if (editingId) {
      savedId = editingId;
      const idx = data[date].findIndex(x => x.id === editingId);
      if (idx >= 0) data[date][idx] = { id: editingId, driver, car, routes: sorted };
      toast('✏️ 配車を更新したよ');
    } else {
      savedId = uid();
      data[date].push({ id: savedId, driver, car, routes: sorted });
      toast('💾 配車を保存したよ');
    }
    save(); clearForm(); renderAll();

    // 保存した配車が重複していたら警告
    const conf = detectDayConflicts(data[date] || []);
    const savedItem = (data[date] || []).find(x => x.id === savedId);
    if (savedItem && savedItem.routes.some(r => conf.has(r))) {
      setTimeout(() => toast('⚠️ 時間または車両が重複してるよ！一覧を確認して'), 600);
    }
  };

  function clearForm() {
    editingId = null;
    $('formTitle').textContent = '➕ 配車を追加';
    $('fDriver').value = '';
    $('fCar').value = '';
    selected = [];
    renderSelected(); renderRoutes();
  }
  $('clearBtn').onclick = clearForm;

  // ── 重複検出（時間・車両）────────────────────────
  // 戻り値: Map(routeオブジェクト -> Set('driver'|'car'))
  function detectDayConflicts(items) {
    const flat = [];
    items.forEach(it => it.routes.forEach(r => {
      const s = toMin(r.start), e = toMin(r.end);
      if (s < 9999 && e < 9999 && e > s) flat.push({ it, r, s, e });
    }));
    const map = new Map();
    const add = (r, type) => { if (!map.has(r)) map.set(r, new Set()); map.get(r).add(type); };
    for (let i = 0; i < flat.length; i++) {
      for (let j = i + 1; j < flat.length; j++) {
        const a = flat[i], b = flat[j];
        if (a.s < b.e && b.s < a.e) { // 時間が重なる
          if (a.it.driver === b.it.driver) { add(a.r, 'driver'); add(b.r, 'driver'); }
          if (a.it.car && a.it.car === b.it.car) { add(a.r, 'car'); add(b.r, 'car'); }
        }
      }
    }
    return map;
  }

  // ── 一覧（ドライバー単位でまとめる）────────────────
  function renderList() {
    const items = dayItems();
    if (!items.length) {
      $('list').innerHTML = '<div class="empty">この日の配車はまだないよ</div>';
      return;
    }

    const conflicts = detectDayConflicts(items);

    // ドライバー名でグループ化
    const groups = {};
    items.forEach(it => { (groups[it.driver] = groups[it.driver] || []).push(it); });

    const arr = Object.entries(groups).map(([driver, its]) => {
      const allRoutes = its.flatMap(i => i.routes);
      // 運行時間 = 各便（終了−開始）の合計
      const runMin = allRoutes.reduce((s, r) => {
        const st = toMin(r.start), en = toMin(r.end);
        return (st < 9999 && en < 9999 && en > st) ? s + (en - st) : s;
      }, 0);
      const total = allRoutes.reduce((s, r) => s + (r.allowance||0), 0);
      const minS = Math.min(...allRoutes.map(r => toMin(r.start)));
      return { driver, its, runMin, total, minS };
    });
    arr.sort((a,b) => a.minS - b.minS);

    $('list').innerHTML = arr.map(g => {
      // この人の重複種別を集計
      const types = new Set();
      g.its.forEach(it => it.routes.forEach(r => {
        if (conflicts.has(r)) conflicts.get(r).forEach(t => types.add(t));
      }));
      const hasConflict = types.size > 0;
      let banner = '';
      if (hasConflict) {
        const msgs = [];
        if (types.has('driver')) msgs.push('⏰ 運行時間が重複');
        if (types.has('car'))    msgs.push('🚐 車両が他と重複');
        banner = `<div class="conflict-banner">⚠️ ${msgs.join('　/　')}！確認してね</div>`;
      }

      // 各配車（車両ごと）— 早い順
      const blocks = [...g.its].sort((a,b) => {
        const am = Math.min(...a.routes.map(r=>toMin(r.start)));
        const bm = Math.min(...b.routes.map(r=>toMin(r.start)));
        return am - bm;
      }).map(it => {
        const routes = [...it.routes].sort((a,b) => toMin(a.start) - toMin(b.start));
        const carConflict = it.routes.some(r => conflicts.has(r) && conflicts.get(r).has('car'));
        const lines = routes.map((r,i) => {
          const t = r.start ? `${r.start}〜${r.end}` : '時間未定';
          const cf = conflicts.has(r) ? 'conflict' : '';
          return `<div class="assign-route-line ${cf}">
            <span class="num">${'①②③④⑤⑥⑦⑧'[i]||'・'}</span>
            <span class="t">${t}</span>
            <span>${esc(r.name)}${r.rinji?'<span class="rinji-mark">⚡臨時</span>':''}${cf?' ⚠️':''}</span>
          </div>`;
        }).join('');
        const carLabel = it.car ? `🚐 ${esc(it.car)}` : '🚐 車両未設定';
        return `<div class="assign-sub">
          <div class="assign-sub-head">
            <span class="assign-car ${carConflict?'conflict':''}">${carLabel}</span>
            <span style="font-size:11px;color:var(--gray);">${it.routes.length}便</span>
          </div>
          ${lines}
          <div class="assign-actions">
            <button class="btn btn-sm btn-edit" onclick="editItem('${it.id}')">編集</button>
            <button class="btn btn-sm btn-danger" onclick="delItem('${it.id}')">削除</button>
          </div>
        </div>`;
      }).join('');

      const carCount = g.its.length > 1 ? `<span style="font-size:11px;color:var(--orange);font-weight:700;">🔁 ${g.its.length}台乗継</span>` : '';
      const runLabel = g.runMin > 0
        ? `🚌 運行時間 <b>${Math.floor(g.runMin/60)}時間${String(g.runMin%60).padStart(2,'0')}分</b>`
        : '🚌 運行時間 —';

      return `<div class="driver-group ${hasConflict?'conflict':''}">
        <div class="driver-top">
          <span class="driver-name">👤 ${esc(g.driver)} ${carCount}</span>
        </div>
        ${banner}
        ${blocks}
        <div class="driver-foot">
          <span class="run-time">${runLabel}</span>
          <span class="driver-total">手当 ¥${g.total.toLocaleString()}</span>
        </div>
      </div>`;
    }).join('');
  }

  function renderSummary() {
    const items = dayItems();
    const drivers = new Set(items.map(i => i.driver));
    $('sCount').textContent  = drivers.size;
    $('sRoutes').textContent = items.reduce((s,i) => s + i.routes.length, 0);
    const total = items.reduce((s,i) => s + i.routes.reduce((a,r) => a + (r.allowance||0), 0), 0);
    $('sAllow').textContent  = '¥' + total.toLocaleString();
  }

  function renderAll() { renderPickers(); renderRoutes(); renderList(); renderSummary(); }

  window.editItem = function(id) {
    const item = dayItems().find(x => x.id === id);
    if (!item) return;
    editingId = id;
    $('formTitle').textContent = `✏️ 編集：${item.driver}`;
    $('fDriver').value = item.driver;
    $('fCar').value = item.car || '';
    selected = item.routes.map(r => ({...r}));
    renderSelected(); renderRoutes();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.delItem = function(id) {
    if (!confirm('この配車を削除する？')) return;
    const date = $('fDate').value;
    data[date] = (data[date]||[]).filter(x => x.id !== id);
    save(); renderAll();
    toast('🗑 削除したよ');
  };

  $('resetDayBtn').onclick = () => {
    if (!confirm('この日の配車を全部消す？（元に戻せないよ）')) return;
    delete data[$('fDate').value];
    save(); clearForm(); renderAll();
    toast('この日をクリアしたよ');
  };

  // ── JSON書き出し（固定ファイル名で上書き運用）──────
  $('exportBtn').onclick = () => {
    const payload = {
      app: 'haisya-app1', version: 2,
      exported: new Date().toISOString(),
      assignments: data, customRoutes: customRoutes
    };
    const json = JSON.stringify(payload, null, 2);
    if (navigator.share) {
      const file = new File([json], `配車データ_master.json`, { type:'application/json' });
      navigator.share({ files:[file], title:'配車データ' }).catch(() => copyJson(json));
    } else copyJson(json);
  };
  function copyJson(json) {
    navigator.clipboard.writeText(json)
      .then(() => toast('📋 コピーしたよ！クロエに貼り付けてね'))
      .catch(() => alert(json));
  }

  // ── JSON読み込み ──────────────────────────────────
  $('importBtn').onclick = () => $('importFile').click();
  $('importFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(reader.result);
        let importData, importCustom = [];
        if (obj.app === 'haisya-app1' && obj.assignments) {
          importData = obj.assignments;
          importCustom = obj.customRoutes || [];
        } else { importData = obj; }
        const dates = Object.keys(importData);
        if (!confirm(`${dates.length}日分のデータを読み込むよ。\n同じ日付は上書きされる。いい？`)) {
          e.target.value = ''; return;
        }
        Object.assign(data, importData);
        save();
        importCustom.forEach(r => {
          if (!customRoutes.some(c => c.name === r.name) && !MASTER_NAMES.has(r.name)) {
            customRoutes.push(r);
          }
        });
        saveCustom();
        clearForm(); renderAll();
        toast(`📥 ${dates.length}日分を読み込んだよ！`);
      } catch {
        toast('⚠️ ファイルを読み込めなかったよ');
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  });

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function toast(msg) {
    const t = $('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── 起動 ─────────────────────────────────────────
  $('verLabel').textContent = 'v' + APP_VERSION;
  $('fDate').value = todayISO();
  $('fDate').addEventListener('change', () => { clearForm(); renderAll(); });
  // 手入力時もチップの選択状態を同期
  $('fDriver').addEventListener('input', renderPickers);
  $('fCar').addEventListener('input', renderPickers);
  renderAll();
</script>
</body>
</html>
